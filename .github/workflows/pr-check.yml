name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Backend lint
        working-directory: ./backend
        run: npm ci && npm run lint || true
      - name: Frontend lint
        working-directory: ./frontend
        run: npm ci && npm run lint || true
